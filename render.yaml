services:
  - type: web
    name: bgm-crm
    env: node
    region: singapore
    plan: free
    buildCommand: pnpm install && pnpm exec vite build --config vite.config.production.ts && pnpm exec esbuild server/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
